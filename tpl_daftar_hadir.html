<!-- Template: Daftar Hadir -->
<!-- Usage: getHtml_daftarHadir(data) -->
<div style="font-family: 'Times New Roman', Times, serif; color: #000; padding: 10px 40px; width: 100%; box-sizing: border-box;">
    ${getSchoolKop(data.schoolData)}
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="margin: 0; font-size: 16px; text-decoration: underline; font-weight: bold;">DAFTAR HADIR</h2>
        <h3 style="margin: 5px 0 0 0; font-size: 14px;">${data.uraian}</h3>
    </div>
    <table style="width: 100%; border-collapse: collapse; border: 1px solid #000; margin-bottom: 30px; font-size: 12px;">
        <thead>
            <tr style="background: #f0f0f0;">
                <th style="border: 1px solid #000; padding: 10px; width: 40px;">NO</th>
                <th style="border: 1px solid #000; padding: 10px;">NAMA</th>
                <th style="border: 1px solid #000; padding: 10px; width: 150px;">JABATAN</th>
                <th style="border: 1px solid #000; padding: 10px; width: 180px;">TANDA TANGAN</th>
            </tr>
        </thead>
        <tbody>
            ${attendanceRows}
        </tbody>
    </table>
    <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
        <div style="text-align: center; width: 250px;"><p style="margin-bottom: 5px;">Mengetahui,</p><p style="font-weight: bold; margin-bottom: 80px;">Kepala Sekolah</p><p style="font-weight: bold; text-decoration: underline; margin:0;">${data.schoolData.principal}</p></div>
    </div>
</div>
