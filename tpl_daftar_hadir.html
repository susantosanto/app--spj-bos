<script>
    // --- DAFTAR HADIR TEMPLATE ---
    function getDaftarHadirHtml(uraian, schoolData, schoolKop) {
        const cleanUraian = uraian.replace(/^(Belanja )?Konsumsi \((Makan & Snack|Makan|Snack)\) /i, "").replace(/^Konsumsi \((Makan & Snack|Makan|Snack)\) /i, "");
        const attendanceRows = document.querySelectorAll('.attendance-row');
        let listHtml = '';
        attendanceRows.forEach((row, i) => {
            const inputs = row.querySelectorAll('input');
            const isEven = (i + 1) % 2 === 0;
            listHtml += `<tr style="height: 50px;"><td style="border: 1px solid #000; text-align: center;">${i + 1}</td><td style="border: 1px solid #000; padding-left: 8px;">${inputs[0]?.value || ""}</td><td style="border: 1px solid #000; padding-left: 8px;">${inputs[1]?.value || ""}</td><td style="border: 1px solid #000;"><div style="display: flex; padding-left: 10px; font-size: 11px;"><span>${i + 1}.</span><div style="width: 100%; border-bottom: 1px dotted #000; margin-top: 15px; margin-left: ${isEven ? '80' : '0'}px;"></div></div></td></tr>`;
        });

        return `
            <div style="font-family: 'Times New Roman', Times, serif; color: #000; padding: 10px 40px; width: 100%; box-sizing: border-box;">
                ${schoolKop}
                <div style="text-align: center; margin-bottom: 20px;">
                    <h2 style="margin: 0;">DAFTAR HADIR</h2>
                    <h3 style="margin: 0; font-size: 16px;">${cleanUraian}</h3>
                </div>
                <table style="width: 100%; border-collapse: collapse; border: 1px solid #000; margin-bottom: 40px; font-size: 13px;">
                    <thead><tr style="background: #f0f0f0;"><th style="border: 1px solid #000; padding: 10px; width: 40px;">NO</th><th style="border: 1px solid #000; padding: 10px;">NAMA</th><th style="border: 1px solid #000; padding: 10px; width: 180px;">JABATAN</th><th style="border: 1px solid #000; padding: 10px; width: 180px;">TANDA TANGAN</th></tr></thead>
                    <tbody>${listHtml || '<tr><td colspan="4" style="text-align:center; padding:20px;">Belum ada data hadir</td></tr>'}</tbody>
                </table>
                <div style="display: flex; justify-content: flex-end;"><div style="text-align: center; width: 250px;"><p style="margin-bottom: 5px;">Mengetahui,</p><p style="font-weight: bold; margin-bottom: 80px;">Kepala Sekolah</p><p style="font-weight: bold; text-decoration: underline; margin:0;">${schoolData.principal}</p><p style="margin:0;">NIP. ${schoolData.principalNip}</p></div></div>
            </div>`;
    }
</script>
