<!-- Attendance Section -->
<div id="attendanceSection" style="display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e2e8f0;">
    <h4 style="font-size: 14px; font-weight: 700; margin-bottom: 12px;">Daftar Hadir</h4>
    <div id="attendanceList" style="display: flex; flex-direction: column; gap: 8px;"></div>
    <button type="button" class="btn-primary" onclick="addAttendanceRow()" style="margin-top: 12px; width: 100%; justify-content: center;">
        <i data-lucide="plus" size="16"></i> Tambah Peserta
    </button>
    <button type="button" class="btn-danger" onclick="loadDefaultAttendance()" style="margin-top: 8px; width: 100%; justify-content: center;">
        <i data-lucide="users" size="16"></i> Load Default
    </button>
</div>
