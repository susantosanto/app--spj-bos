<!-- Template: Daftar Penerima Honor -->
<!-- Usage: getHtml_daftarHonor(data) -->
<div style="font-family: Arial, sans-serif; color: #000; padding: 10px 40px; width: 100%; box-sizing: border-box;">
    ${getSchoolKop(data.schoolData)}
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="margin: 0; font-size: 16px; text-decoration: underline; font-weight: bold;">DAFTAR PENERIMA HONOR</h2>
        <p style="margin: 5px 0 0 0; font-size: 13px;">Nomor: ${data.nomorSurat}</p>
    </div>
    <table style="width: 100%; border-collapse: collapse; border: 1px solid #000; margin-bottom: 20px; font-size: 12px;">
        <thead>
            <tr style="background: #f0f0f0;">
                <th style="border: 1px solid #000; padding: 10px; width: 40px;">NO</th>
                <th style="border: 1px solid #000; padding: 10px;">NAMA</th>
                <th style="border: 1px solid #000; padding: 10px;">JABATAN</th>
                <th style="border: 1px solid #000; padding: 10px; width: 120px;">HONOR</th>
                <th style="border: 1px solid #000; padding: 10px; width: 100px;">TTD</th>
            </tr>
        </thead>
        <tbody>
            ${honorRows}
            <tr style="font-weight: bold;">
                <td colspan="3" style="border: 1px solid #000; padding: 10px; text-align: right;">TOTAL</td>
                <td style="border: 1px solid #000; padding: 10px; text-align: right;">Rp ${totalHonor.toLocaleString('id-ID')}</td>
                <td></td>
            </tr>
        </tbody>
    </table>
    <div style="display: flex; justify-content: flex-end; margin-top: 30px;">
        <div style="text-align: center; width: 250px;"><p style="margin-bottom: 5px;">${getDateText(data.tanggal).fullDate}</p><p style="font-weight: bold; margin-bottom: 80px;">Kepala Sekolah</p><p style="font-weight: bold; text-decoration: underline; margin:0;">${data.schoolData.principal}</p></div>
    </div>
</div>
