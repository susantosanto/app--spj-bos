<script>
    function getHtml_kwitansi(data) {
        const schoolData = data.schoolData;
        const nomorSurat = data.nomorSurat;
        const terbilangText = data.terbilangText;
        const uraian = data.uraian;
        const jumlah = data.jumlah;
        const stampBase64 = data.stampBase64;
        const custTempatTanggalKwitansi = data.custTempatTanggalKwitansi || "";
        const vendorName = data.vendorName || "";

        return `
            <div style="border: 4px double #000; padding: 15px; font-family: Arial, sans-serif; color: #000; background: #fff; width: 100%; box-sizing: border-box;">
                <h1 style="text-align: center; text-decoration: underline; margin-bottom: 20px; font-size: 24px; letter-spacing: 5px;">KUITANSI</h1>

                <div style="display: grid; grid-template-columns: 180px 20px 1fr; gap: 10px; line-height: 2;">
                    <div style="font-weight: bold;">Nomor</div><div>:</div><div style="border-bottom: 1px dashed #000;">${nomorSurat}</div>

                    <div>Sudah terima dari</div><div>:</div><div style="border-bottom: 1px dashed #000; font-weight: bold;">BENDAHARA BOS ${schoolData.name}</div>

                    <div>Banyaknya uang</div><div>:</div><div style="background: #e2e8f0; padding: 0 10px; font-style: italic; font-weight: bold;">### ${terbilangText} ###</div>

                    <div>Untuk pembayaran</div><div>:</div><div style="border-bottom: 1px dashed #000;">${uraian}</div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 40px;">
                    <div style="text-align: center; border: 1px solid #000; padding: 10px 15px; min-width: 150px; height: fit-content; margin-bottom: 10px;">
                        <p style="margin:0; font-size: 11px;">Jumlah Rp.</p>
                        <p style="margin:0; font-size: 18px; font-weight: bold;">${jumlah.toLocaleString('id-ID')},-</p>
                    </div>

                    <div style="display: flex; gap: 30px; justify-content: flex-end; align-items: flex-start;">
                        <div style="text-align: center; min-width: 140px;">
                            <p style="margin-bottom: 8px; font-size: 13px;">Setuju Dibayar,</p>
                            <p style="font-weight: bold; margin-bottom: 70px; font-size: 13px;">Kepala Sekolah</p>
                            <p style="font-weight: bold; text-decoration: underline; margin:0; font-size: 12px; word-wrap: break-word;">${schoolData.principal}</p>
                            <p style="margin:0; font-size: 11px;">NIP. ${schoolData.principalNip}</p>
                        </div>
                        <div style="text-align: center; min-width: 140px;">
                            <p style="margin-bottom: 8px; font-size: 13px;">Lunas Dibayar,</p>
                            <p style="font-weight: bold; margin-bottom: 70px; font-size: 13px;">Bendahara</p>
                            <p style="font-weight: bold; text-decoration: underline; margin:0; font-size: 12px; word-wrap: break-word;">${schoolData.treasurer}</p>
                            <p style="margin:0; font-size: 11px;">NIP. ${schoolData.treasurerNip}</p>
                        </div>
                        <div style="text-align: center; min-width: 140px; position: relative;">
                            <p style="margin-bottom: 8px; font-size: 13px; opacity: 0;">&nbsp;</p>
                            ${stampBase64 ? `<img src="${stampBase64}" style="position: absolute; top: 5px; left: 50%; transform: translateX(-50%); width: 60px; opacity: 0.8;">` : ''}
                            <p style="margin-bottom: 5px; font-size: 12px; text-align: right;">${custTempatTanggalKwitansi || (schoolData.kecamatan + ", " + data.dateInfo.fullDate)}</p>
                            <p style="font-weight: bold; margin-bottom: 70px; font-size: 13px;">Penerima</p>
                            <p style="font-weight: bold; margin:0; font-size: 12px; min-height: 20px;">( ${vendorName || "................................."} )</p>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }
</script>
