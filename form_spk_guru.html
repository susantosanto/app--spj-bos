<!-- SPK Guru Honorer Section -->
<div id="spkGuruHonorerSection" style="display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e2e8f0;">
    <h4 style="font-size: 14px; font-weight: 700; margin-bottom: 12px;">Detail PKS Guru Honorer</h4>
    <div class="form-group">
        <label>Nama Guru</label>
        <input type="text" id="custSpkGuruName" placeholder="Nama guru honorer" oninput="updatePreview()">
    </div>
    <div class="form-group">
        <label>NIP</label>
        <input type="text" id="custSpkGuruNip" placeholder="NIP (jika ada)" oninput="updatePreview()">
    </div>
    <div class="form-group">
        <label>Mata Pelajaran</label>
        <input type="text" id="custSpkGuruMapel" placeholder="Mata pelajaran yang diampu" oninput="updatePreview()">
    </div>
    <div class="form-group">
        <label>Jam Mengajar per Minggu</label>
        <input type="number" id="custSpkGuruJam" placeholder="24" oninput="updatePreview()">
    </div>
    <div class="form-group full-width">
        <label>Honor per Bulan</label>
        <input type="number" id="custSpkGuruHonor" placeholder="500000" oninput="updatePreview()">
    </div>
</div>
