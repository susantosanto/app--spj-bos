    // --- DAFTAR HADIR TEMPLATE ---
    function getDaftarHadirHtml(uraian, schoolData, schoolKop) {
        const cleanUraian = uraian.replace(/^(Belanja )?Konsumsi \((Makan & Snack|Makan|Snack)\) /i, "").replace(/^Konsumsi \((Makan & Snack|Makan|Snack)\) /i, "");
        const attendanceRows = document.querySelectorAll('.attendance-row');
        let listHtml = '';
        attendanceRows.forEach((row, i) => {
            const inputs = row.querySelectorAll('input');
            const isEven = (i + 1) % 2 === 0;
            listHtml += `<tr style="height: 50px;"><td style="border: 1px solid #000; text-align: center;">${i + 1}</td><td style="border: 1px solid #000; padding-left: 8px;">${inputs[0]?.value || ""}</td><td style="border: 1px solid #000; padding-left: 8px;">${inputs[1]?.value || ""}</td><td style="border: 1px solid #000;"><div style="display: flex; padding-left: 10px; font-size: 11px;"><span>${i + 1}.</span><div style="width: 100%; border-bottom: 1px dotted #000; margin-top: 15px; margin-left: ${isEven ? '80' : '0'}px;"></div></div></td></tr>`;
        });

        return `
            <div style="font-family: 'Times New Roman', Times, serif; color: #000; padding: 10px 40px; width: 100%; box-sizing: border-box;">
                ${schoolKop}
                <div style="text-align: center; margin-bottom: 20px;">
                    <h2 style="margin: 0;">DAFTAR HADIR</h2>
                    <h3 style="margin: 0; font-size: 16px;">${cleanUraian}</h3>

                <table style="width: 100%; border-collapse: collapse; border: 1px solid #000; margin-bottom: 40px; font-size: 13px;">
                    <thead><tr style="background: #f0f0f0;"><th style="border: 1px solid #000; padding: 10px; width: 40px;">NO</th><th style="border: 1px solid #000; padding: 10px;">NAMA</th><th style="border: 1px solid #000; padding: 10px; width: 180px;">JABATAN</th><th style="border: 1px solid #000; padding: 10px; width: 180px;">TANDA TANGAN</th></tr></thead>
                    <tbody>${listHtml || '<tr><td colspan="4" style="text-align:center; padding:20px;">Belum ada data hadir</td></tr>'}</tbody>
                </table>
                <div style="display: flex; justify-content: flex-end;"><div style="text-align: center; width: 250px;"><p style="margin-bottom: 5px;">Mengetahui,</p><p style="font-weight: bold; margin-bottom: 80px;">Kepala Sekolah</p><p style="font-weight: bold; text-decoration: underline; margin:0;">${schoolData.principal}</p><p style="margin:0;">NIP. ${schoolData.principalNip}</p></div></div>
            </div>`;
    }

    // --- DOKUMENTASI TEMPLATE ---
    function getDokumentasiHtml(uraian, dateInfo, schoolData, schoolKop) {
        const cleanUraian = uraian.replace(/^(Belanja )?Konsumsi \((Makan & Snack|Makan|Snack)\) /i, "").replace(/^Konsumsi \((Makan & Snack|Makan|Snack)\) /i, "");
        const photos = [];
        for (let i = 1; i <= 5; i++) { if (docPhotos[i]) photos.push(docPhotos[i]); }
        const count = photos.length;
        let photoHtml = '';
        const imgStyle = (maxH) => `max-width:100%; max-height:${maxH}px; object-fit:contain; display:block; margin:auto;`;
        const box = (src, maxH) => `<div style="border:1px solid #555; padding:6px; background:#fafafa;"><img src="${src}" style="${imgStyle(maxH)}"></div>`;
        const caption = (n) => `<div style="text-align:center; font-size:10px; color:#555; margin-top:3px;">Foto ${n}</div>`;
        const cell = (src, n, maxH) => `<div>${box(src, maxH)}${caption(n)}</div>`;

        if (count === 0) {
            photoHtml = `<div style="border:2px dashed #ccc; width:100%; height:280px; display:flex; align-items:center; justify-content:center; color:#aaa; font-size:14px; border-radius:4px;">📷 Foto Kegiatan Belum Diupload</div>`;

            photoHtml = `<div style="width:100%;">${box(photos[0], 480)}${caption(1)}</div>`;
        } else if (count === 2) {
            photoHtml = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%;">${cell(photos[0], 1, 320)}${cell(photos[1], 2, 320)}</div>`;
        } else if (count === 3) {
            photoHtml = `<div style="display:flex; flex-direction:column; gap:12px; width:100%;"><div>${box(photos[0], 320)}${caption(1)}</div><div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">${cell(photos[1], 2, 220)}${cell(photos[2], 3, 220)}</div></div>`;
        } else if (count === 4) {
            photoHtml = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%;">${cell(photos[0], 1, 240)}${cell(photos[1], 2, 240)}${cell(photos[2], 3, 240)}${cell(photos[3], 4, 240)}</div>`;

        }

        return `

                        <p style="margin:0;">NIP. ${schoolData.principalNip}</p>
                    </div>
                </div>
            </div>`;
    }

                <p style="text-align: justify; line-height: 1.2; margin-bottom: 4px;">Para pihak masing-masing telah mempelajari, memahami dan sepakat untuk mengikat diri dalam Surat Perjanjian Kerja dengan ketentuan sebagai berikut :</p>

                <p style="margin-top: 5px;"><strong>Pasal 2<br>Hak dan Kewajiban</strong></p>

                <p style="margin-top: 8px;"><strong>Pasal 7<br>Lain – lain</strong></p>
                <p style="line-height: 1.4;">(1) Surat Perjanjian Kerja : a. Surat Perjanjian Kerja dilampiri oleh Surat Keputusan Pembagian Tugas Pendidik dan Tenaga Kependidikan. (2) Hal–hal yang belum diatur dari/atau terdapat kekeliruan dalam Surat Perjanjian Kerja ini dapat dimusyawarahkan kembali oleh kedua belah pihak.</p>

                <p style="margin-top: 8px;"><strong>Pasal 8<br>Penutup</strong></p>
