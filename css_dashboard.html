<style>
    /* ========================================
       DASHBOARD PREMIUM REDESIGN 2026
       Modern, Elegant & Professional
       ======================================== */

    #dashboard-view.active {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 40px);
        overflow: hidden;
    }

    .dashboard-container {
        display: flex;
        flex-direction: column;
        gap: 16px;
        animation: fadeIn 0.5s ease-out;
        flex: 1;
        min-height: 0;
    }

    /* Premium Hero Section */
    .dashboard-hero {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #1e3a8a 100%);
        border-radius: 28px;
        padding: 28px 36px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
        min-height: 110px;
    }

    .dashboard-hero::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -10%;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 60%);
        border-radius: 50%;
        animation: pulse 8s ease-in-out infinite;
    }

    .dashboard-hero::after {
        content: '';
        position: absolute;
        bottom: -30%;
        left: -5%;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
        border-radius: 50%;
        animation: pulse 10s ease-in-out infinite reverse;
    }

    @keyframes pulse {

        0%,
        100% {
            transform: scale(1);
            opacity: 0.5;
        }

        50% {
            transform: scale(1.1);
            opacity: 0.8;
        }
    }

    .hero-content {
        position: relative;
        z-index: 10;
    }

    .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(59, 130, 246, 0.15);
        border: 1px solid rgba(59, 130, 246, 0.3);
        padding: 5px 12px;
        border-radius: 50px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #60a5fa;
        margin-bottom: 10px;
        backdrop-filter: blur(10px);
    }

    .hero-text h1 {
        font-size: 28px;
        font-weight: 900;
        margin-bottom: 8px;
        letter-spacing: -1px;
        background: linear-gradient(to right, #ffffff 0%, #e0e7ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .hero-text p {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        font-weight: 400;
        line-height: 1.5;
    }

    /* Premium Clock Widget */
    .clock-widget {
        position: relative;
        z-index: 10;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        padding: 14px 24px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-align: right;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .clock-widget:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        border-color: rgba(59, 130, 246, 0.3);
    }

    .clock-time {
        font-size: 36px;
        font-weight: 900;
        font-variant-numeric: tabular-nums;
        background: linear-gradient(135deg, #38bdf8 0%, #818cf8 50%, #c084fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        letter-spacing: 6px;
        filter: drop-shadow(0 4px 20px rgba(56, 189, 248, 0.5));
    }

    .clock-date {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        font-weight: 500;
        margin-top: 6px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
    }

    /* Dashboard Grid Layout */
    .dashboard-content-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
        flex: 1;
    }

    /* Premium Stats Column */
    .stats-column {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .stat-card-premium {
        background: white;
        border-radius: 20px;
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

    .stat-card-premium::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--stat-color, #3b82f6), transparent);
        opacity: 0;
        transition: opacity 0.4s;
    }

    .stat-card-premium:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.08), 0 10px 10px -5px rgba(0, 0, 0, 0.03);
        border-color: var(--stat-color, #3b82f6);
    }

    .stat-card-premium:hover::before {
        opacity: 1;
    }

    .stat-header {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .stat-icon-premium {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
    }

    .stat-card-premium:hover .stat-icon-premium {
        transform: scale(1.1) rotate(-5deg);
    }

    .stat-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #64748b;
    }

    .stat-value {
        font-size: 26px;
        font-weight: 900;
        color: #0f172a;
        letter-spacing: -0.5px;
    }

    .stat-subtext {
        font-size: 12px;
        color: #64748b;
        line-height: 1.5;
    }

    /* ========================================
       ULTRA MINIMALIST QUICK ACCESS CARDS
       Mindblowing Modern & Professional
       ======================================== */
    .quick-access-section {
        background: transparent;
        border-radius: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        box-shadow: none;
        border: none;
    }

    .qa-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
    }

    .qa-card-minimal {
        background: #ffffff;
        border-radius: 18px;
        padding: 22px 20px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        cursor: pointer;
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        border: 1px solid rgba(226, 232, 240, 0.6);
        position: relative;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
    }

    .qa-card-minimal::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;

        bottom: 0;

        opacity: 0;
        transition: opacity 0.5s;
        z-index: 0;
    }

    .qa-card-minimal::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 3px;
        background: var(--card-color);
        border-radius: 3px 3px 0 0;
        transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .qa-card-minimal:hover::before {
        opacity: 1;
    }

    .qa-card-minimal:hover::after {
        width: 60%;
    }

    .qa-card-minimal:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 20px rgba(0, 0, 0, 0.04);
        border-color: transparent;
    }

    .qa-icon-minimal {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        z-index: 1;
        background: var(--card-bg);
        color: var(--card-color);
    }

    .qa-card-minimal:hover .qa-icon-minimal {
        transform: scale(1.08);
        box-shadow: 0 8px 24px var(--card-shadow);
    }

    .qa-icon-minimal i {
        transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .qa-card-minimal:hover .qa-icon-minimal i {
        transform: scale(1.15);
    }

    .qa-content-minimal {
        position: relative;
        z-index: 1;
        width: 100%;
    }

    .qa-title-minimal {
        font-size: 15px;
        font-weight: 700;
        color: #0f172a;
        margin-bottom: 5px;
        letter-spacing: -0.3px;
        transition: color 0.3s;
    }

    .qa-card-minimal:hover .qa-title-minimal {
        color: var(--card-color);
    }

    .qa-desc-minimal {
        font-size: 11px;
        color: #94a3b8;
        line-height: 1.4;
        font-weight: 500;
    }

    .qa-arrow-minimal {
        position: absolute;
        top: 24px;
        right: 20px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--card-color);
        opacity: 0;
        transform: translateX(-8px);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 1;
        background: rgba(0, 0, 0, 0.03);
    }

    .qa-card-minimal:hover .qa-arrow-minimal {
        opacity: 1;
        transform: translateX(0);
    }

    /* Responsive */
    @media (max-width: 1024px) {
        .dashboard-content-grid {
            grid-template-columns: 1fr;
        }

        .dashboard-hero {
            flex-direction: column;
            text-align: center;
            gap: 20px;
        }

        .clock-widget {
            text-align: center;
        }

        .clock-date {
            justify-content: center;
        }
    }
