<!-- Template: Dokumentasi -->
<!-- Usage: getHtml_dokumentasi(data) -->
<div style="font-family: 'Times New Roman', Times, serif; color: #000; padding: 10px 40px; width: 100%; box-sizing: border-box;">
    ${getSchoolKop(data.schoolData)}
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="margin: 0; font-size: 16px; text-decoration: underline; font-weight: bold;">LEMBAR DOKUMENTASI</h2>
        <h3 style="margin: 5px 0 0 0; font-size: 14px;">${data.uraian}</h3>
    </div>
    <div style="margin: 20px 0;">
        ${photoHtml}
    </div>
    <div style="display: flex; justify-content: flex-end; margin-top: 30px;">
        <div style="text-align: center; width: 250px;"><p style="margin-bottom: 5px;">${getDateText(data.tanggal).fullDate}</p><p style="font-weight: bold; margin-bottom: 80px;">Kepala Sekolah</p><p style="font-weight: bold; text-decoration: underline; margin:0;">${data.schoolData.principal}</p></div>
    </div>
</div>
