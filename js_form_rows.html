<script>
    // --- Dynamic Form Row Management ---

    function addAttendanceRow(nama = "", jabatan = "") {
        const list = document.getElementById('attendanceList');
        if (!list) return;
        const div = document.createElement('div');
        div.className = 'dynamic-row attendance-row';
        div.innerHTML = `
            <input type="text" placeholder="Nama" value="${nama}" oninput="updatePreview()">
            <input type="text" placeholder="Jabatan" value="${jabatan}" oninput="updatePreview()">
            <button class="btn-icon-danger" style="color: #ef4444; background: none; border: none; cursor: pointer; padding: 4px;" onclick="this.parentElement.remove(); updatePreview();">
                <i data-lucide="trash-2" size="14"></i>
            </button>
        `;
        list.appendChild(div);
        lucide.createIcons();
        updatePreview();
    }

    function loadDefaultAttendance() {
        const list = document.getElementById('attendanceList');
        if (!list) return;
        list.innerHTML = '';
        const defaults = [
            { n: 'DRS. H. DEDI SUMARDI, M.MPd', j: 'Pengarah' },
            { n: 'H. ADE RAHMAT, S.Pd', j: 'Ketua' },
            { n: 'DEDI SURYADI, S.Pd', j: 'Sekretaris' },
            { n: 'CICIH, S.Pd', j: 'Bendahara' }
        ];
        defaults.forEach(d => addAttendanceRow(d.n, d.j));
    }

    function addHonorRow(nama = "", jabatan = "", jumlah = 0) {
        const list = document.getElementById('honorList');
        if (!list) return;
        const div = document.createElement('div');
        div.className = 'dynamic-row honor-row';
        div.style.padding = "10px";
        div.style.border = "1px solid #e2e8f0";
        div.style.borderRadius = "8px";
        div.style.background = "#fff";
        div.style.marginBottom = "8px";

        div.innerHTML = `
            <div style="display: grid; grid-template-columns: 35px 1fr 1fr; gap: 8px; margin-bottom: 8px;">
                <input type="text" placeholder="No" value="${document.querySelectorAll('.honor-row').length + 1}" style="text-align: center;">
                <input type="text" placeholder="Nama PTK" value="${nama}" oninput="updatePreview()">
                <input type="text" placeholder="Jabatan/Tugas" value="${jabatan}" oninput="updatePreview()">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px;">
                 <input type="text" placeholder="Gol" value="-" oninput="updatePreview()">
                 <input type="text" placeholder="Vol" value="1 Bln" oninput="updatePreview()">
                 <input type="number" placeholder="Unit Cost" value="${jumlah}" oninput="updatePreview()">
                 <input type="number" placeholder="Bruto" value="${jumlah}" oninput="updatePreview()">
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                 <input type="number" placeholder="Pajak" value="0" style="flex: 1;" oninput="updatePreview()">
                 <input type="number" placeholder="Netto" value="${jumlah}" style="flex: 1; font-weight: bold; background: #f0fdf4;" oninput="updatePreview()">
                 <button class="btn-icon-danger" style="color: #ef4444; background: none; border: none; padding: 8px;" onclick="this.parentElement.parentElement.remove(); updatePreview();">
                    <i data-lucide="trash-2" size="16"></i>
                </button>
            </div>
        `;
        list.appendChild(div);
        lucide.createIcons();
        updatePreview();
    }

    function addNotaItem(name = "", qty = 1, price = 0) {
        const list = document.getElementById('notaItemsList');
        if (!list) return;
        const div = document.createElement('div');
        div.className = 'dynamic-row nota-item-row';
        div.style.display = "flex";
        div.style.gap = "8px";
        div.style.marginBottom = "8px";
        div.innerHTML = `
            <input type="text" placeholder="Nama Item" value="${name}" style="flex: 2;" oninput="updatePreview()">
            <input type="number" placeholder="Qty" value="${qty}" style="width: 50px;" oninput="updatePreview()">
            <input type="number" placeholder="Harga" value="${price}" style="flex: 1;" oninput="updatePreview()">
            <button class="btn-icon-danger" style="color: #ef4444; background: none; border: none; padding: 4px;" onclick="this.parentElement.remove(); updatePreview();">
                <i data-lucide="trash-2" size="14"></i>
            </button>
        `;
        list.appendChild(div);
        lucide.createIcons();
        updatePreview();
    }

    function addMakananRow(menu = "", vol = 1, unit = "Box", price = 0) {
        const list = document.getElementById('makananList');
        if (!list) return;
        const div = document.createElement('div');
        div.className = 'dynamic-row makanan-row';
        div.style.display = "flex";
        div.style.gap = "4px";
        div.style.marginBottom = "4px";
        div.innerHTML = `
            <input type="text" placeholder="Menu" value="${menu}" style="flex: 2; font-size: 11px;" oninput="updatePreview()">
            <input type="number" placeholder="Vol" value="${vol}" style="width: 40px; font-size: 11px;" oninput="updatePreview()">
            <input type="text" placeholder="Sat" value="${unit}" style="width: 40px; font-size: 11px;" oninput="updatePreview()">
            <input type="number" placeholder="Harga" value="${price}" style="flex: 1; font-size: 11px;" oninput="updatePreview()">
            <button class="btn-icon-danger" style="color: #ef4444; background: none; border: none; padding: 2px;" onclick="this.parentElement.remove(); updatePreview();">
                <i data-lucide="trash-2" size="12"></i>
            </button>
        `;
        list.appendChild(div);
        lucide.createIcons();
        updatePreview();
    }

    function addBarangRow(no = "", nama = "", spek = "", vol = 1, unit = "Unit", price = 0) {
        const list = document.getElementById('barangList');
        if (!list) return;
        const div = document.createElement('div');
        div.className = 'dynamic-row barang-row';
        div.style.display = "flex";
        div.style.gap = "4px";
        div.style.marginBottom = "4px";
        div.innerHTML = `
            <input type="text" placeholder="No" value="${no || document.querySelectorAll('.barang-row').length + 1}" style="width: 25px; font-size: 11px;" oninput="updatePreview()">
            <input type="text" placeholder="Nama" value="${nama}" style="flex: 1.5; font-size: 11px;" oninput="updatePreview()">
            <input type="text" placeholder="Spek" value="${spek}" style="flex: 1; font-size: 11px;" oninput="updatePreview()">
            <input type="number" placeholder="Vol" value="${vol}" style="width: 35px; font-size: 11px;" oninput="updatePreview()">
            <input type="text" placeholder="Sat" value="${unit}" style="width: 35px; font-size: 11px;" oninput="updatePreview()">
            <input type="number" placeholder="Harga" value="${price}" style="flex: 1; font-size: 11px;" oninput="updatePreview()">
            <button class="btn-icon-danger" style="color: #ef4444; background: none; border: none; padding: 2px;" onclick="this.parentElement.remove(); updatePreview();">
                <i data-lucide="trash-2" size="12"></i>
            </button>
        `;
        list.appendChild(div);
        lucide.createIcons();
        updatePreview();
    }

    function addJasaRow(no = "", jenis = "", vol = 1, unit = "Kgt", price = 0) {
        const list = document.getElementById('jasaList');
        if (!list) return;
        const div = document.createElement('div');
        div.className = 'dynamic-row jasa-row';
        div.style.display = "flex";
        div.style.gap = "4px";
        div.style.marginBottom = "4px";
        div.innerHTML = `
            <input type="text" placeholder="No" value="${no || document.querySelectorAll('.jasa-row').length + 1}" style="width: 25px; font-size: 11px;" oninput="updatePreview()">
            <input type="text" placeholder="Jenis" value="${jenis}" style="flex: 2; font-size: 11px;" oninput="updatePreview()">
            <input type="number" placeholder="Vol" value="${vol}" style="width: 40px; font-size: 11px;" oninput="updatePreview()">
            <input type="text" placeholder="Sat" value="${unit}" style="width: 40px; font-size: 11px;" oninput="updatePreview()">
            <input type="number" placeholder="Harga" value="${price}" style="flex: 1; font-size: 11px;" oninput="updatePreview()">
            <button class="btn-icon-danger" style="color: #ef4444; background: none; border: none; padding: 2px;" onclick="this.parentElement.remove(); updatePreview();">
                <i data-lucide="trash-2" size="12"></i>
            </button>
        `;
        list.appendChild(div);
        lucide.createIcons();
        updatePreview();
    }

    function updateRincianSections() {
        const type = document.getElementById('custJenisKegiatanPesanan').value;
        const makanan = document.getElementById('rincianMakananSection');
        const barang = document.getElementById('rincianBarangSection');
        const jasa = document.getElementById('rincianJasaSection');

        if (makanan) makanan.style.display = (type === 'makanan') ? 'block' : 'none';
        if (barang) barang.style.display = (type === 'barang') ? 'block' : 'none';
        if (jasa) jasa.style.display = (type === 'jasa') ? 'block' : 'none';
    }
</script>
