<script>
    // --- Form Row Management Functions ---

    // Nota Items
    function addNotaItem(name = '', qty = 1, price = 0) {
        const list = document.getElementById('notaItemsList');
        const row = document.createElement('div');
        row.className = 'nota-item-row';
        row.style.cssText = 'display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 8px; align-items: center;';
        row.innerHTML = `
            <input type="text" placeholder="Nama barang" value="${name}" oninput="updatePreview()">
            <input type="number" placeholder="Qty" value="${qty}" oninput="updatePreview()">
            <input type="number" placeholder="Harga" value="${price}" oninput="updatePreview()">
            <button type="button" class="btn-danger" onclick="this.parentElement.remove(); updatePreview();" style="padding: 8px;">
                <i data-lucide="trash-2" size="16"></i>
            </button>
        `;
        list.appendChild(row);
        lucide.createIcons();
        updatePreview();
    }

    // Attendance Rows
    function addAttendanceRow(nama = '', jabatan = '') {
        const list = document.getElementById('attendanceList');
        const row = document.createElement('div');
        row.className = 'attendance-row';
        row.style.cssText = 'display: grid; grid-template-columns: 2fr 1fr auto; gap: 8px; align-items: center;';
        row.innerHTML = `
            <input type="text" placeholder="Nama peserta" value="${nama}" oninput="updatePreview()">
            <input type="text" placeholder="Jabatan" value="${jabatan}" oninput="updatePreview()">
            <button type="button" class="btn-danger" onclick="this.parentElement.remove(); updatePreview();" style="padding: 8px;">
                <i data-lucide="trash-2" size="16"></i>
            </button>
        `;
        list.appendChild(row);
        lucide.createIcons();
        updatePreview();
    }

    function loadDefaultAttendance() {
        const list = document.getElementById('attendanceList');
        list.innerHTML = '';
        const defaults = [
            { nama: 'Kepala Sekolah', jabatan: 'Ketua Panitia' },
            { nama: 'Bendahara', jabatan: 'Anggota' },
            { nama: 'Guru Senior', jabatan: 'Anggota' },
            { nama: 'Operator Sekolah', jabatan: 'Sekretaris' }
        ];
        defaults.forEach(d => addAttendanceRow(d.nama, d.jabatan));
    }

    // Honor Rows
    function addHonorRow(nama = '', nip = '', jabatan = '', honor = '') {
        const list = document.getElementById('honorList');
        if (!list) return;
        
        const row = document.createElement('div');
        row.className = 'honor-row';
        row.style.cssText = 'display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 8px; align-items: center;';
        row.innerHTML = `
            <input type="text" placeholder="Nama" value="${nama}" oninput="updatePreview()">
            <input type="text" placeholder="NIP" value="${nip}" oninput="updatePreview()">
            <input type="text" placeholder="Jabatan" value="${jabatan}" oninput="updatePreview()">
            <input type="number" placeholder="Honor" value="${honor}" oninput="updatePreview()">
            <button type="button" class="btn-danger" onclick="this.parentElement.remove(); updatePreview();" style="padding: 8px;">
                <i data-lucide="trash-2" size="16"></i>
            </button>
        `;
        list.appendChild(row);
        lucide.createIcons();
        updatePreview();
    }

    // Rincian Sections Visibility
    function updateRincianSections() {
        const docType = document.getElementById('docType').value;

        // Hide all sections first
        const sections = [
            'notaItemsSection',
            'notulenSection',
            'attendanceSection',
            'documentationSection',
            'rencanaExtraSection',
            'spkExtraSection',
            'rincianMakananSection',
            'rincianBarangSection',
            'rincianJasaSection',
            'spkGuruHonorerSection',
            'spkTenagaHonorerSection',
            'skPembagianTugasSection',
            'daftarPenerimaHonorSection',
            'daftarHonorExtraSection'
        ];

        sections.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
        });

        // Show relevant sections based on docType
        if (docType === 'nota') {
            const el = document.getElementById('notaItemsSection');
            if (el) el.style.display = 'block';
        } else if (docType === 'notulen') {
            const el = document.getElementById('notulenSection');
            if (el) el.style.display = 'block';
        } else if (docType === 'daftar_hadir') {
            const el = document.getElementById('attendanceSection');
            if (el) el.style.display = 'block';
        } else if (docType === 'dokumentasi') {
            const el = document.getElementById('documentationSection');
            if (el) el.style.display = 'block';
        } else if (docType === 'rencana') {
            const el = document.getElementById('rencanaExtraSection');
            if (el) el.style.display = 'block';
        } else if (docType === 'spk') {
            const el = document.getElementById('spkExtraSection');
            if (el) el.style.display = 'block';
        } else if (docType === 'pesanan') {
            // Show appropriate rincian based on jenis pesanan
            const jenisPesanan = document.getElementById('custJenisKegiatanPesanan')?.value || 'makanan';
            if (jenisPesanan === 'makanan') {
                const rm = document.getElementById('rincianMakananSection');
                if (rm) rm.style.display = 'block';
            } else if (jenisPesanan === 'barang') {
                const rb = document.getElementById('rincianBarangSection');
                if (rb) rb.style.display = 'block';
            } else if (jenisPesanan === 'jasa') {
                const rj = document.getElementById('rincianJasaSection');
                if (rj) rj.style.display = 'block';
            }
        } else if (docType === 'spk_guru_honorer') {
            const el = document.getElementById('spkGuruHonorerSection');
            if (el) el.style.display = 'block';
        } else if (docType === 'spk_tenaga_honorer') {
            const el = document.getElementById('spkTenagaHonorerSection');
            if (el) el.style.display = 'block';
        } else if (docType === 'sk_pembagian_tugas') {
            const el = document.getElementById('skPembagianTugasSection');
            if (el) el.style.display = 'block';
        } else if (docType === 'daftar_penerima_honor') {
            const el1 = document.getElementById('daftarPenerimaHonorSection');
            const el2 = document.getElementById('daftarHonorExtraSection');
            if (el1) el1.style.display = 'block';
            if (el2) el2.style.display = 'block';
        }
    }

    // Add Makanan Row (for pesanan)
    function addMakananRow() {
        // Implementation for pesanan document
        addNotaItem(); // Reuse nota item structure
    }

    // Add Barang Row
    function addBarangRow() {
        addNotaItem(); // Reuse nota item structure
    }

    // Add Jasa Row
    function addJasaRow() {
        addNotaItem(); // Reuse nota item structure
    }
</script>
