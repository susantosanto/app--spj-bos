<script>
    // --- Google Drive Picker Functions ---

    function openDrivePicker() {
        document.getElementById('driveModal').style.display = 'flex';
        document.getElementById('driveFileList').innerHTML = `
            <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                <i data-lucide="loader-2" class="spin" size="32" style="margin-bottom: 10px;"></i>
                <p>Mencari file di Drive Anda...</p>
            </div>
        `;
        lucide.createIcons();

        google.script.run
            .withSuccessHandler((response) => {
                const listDiv = document.getElementById('driveFileList');
                if (response.success && response.files && response.files.length > 0) {
                    listDiv.innerHTML = response.files.map(file => `
                        <div class="drive-file-item" onclick="processDriveFile('${file.id}', '${file.name}')">
                            <div class="file-icon">
                                <i data-lucide="${file.name.toLowerCase().endsWith('.pdf') ? 'file-text' : 'file-spreadsheet'}" size="24"></i>
                            </div>
                            <div class="file-details">
                                <div class="file-name">${file.name}</div>
                                <div class="file-date">${file.date}</div>
                            </div>
                            <div class="file-action">
                                <i data-lucide="arrow-right" size="18"></i>
                            </div>
                        </div>
                    `).join('');
                } else {
                    listDiv.innerHTML = `
                        <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                            <i data-lucide="search-x" size="48" style="margin-bottom: 10px; opacity: 0.3;"></i>
                            <p>Tidak ditemukan file PDF dengan nama "BKU" di Drive Anda.</p>
                            <button class="btn-primary" style="margin: 20px auto; font-size: 12px;" onclick="closeDrivePicker()">Tutup</button>
                        </div>
                    `;
                }
                lucide.createIcons();
            })
            .getBkuFilesFromDrive();
    }

    function closeDrivePicker() {
        document.getElementById('driveModal').style.display = 'none';
    }

    function processDriveFile(fileId, fileName) {
        // Show loading in the modal
        const listDiv = document.getElementById('driveFileList');
        listDiv.innerHTML = `
            <div style="text-align: center; padding: 60px; color: #2563eb;">
                <i data-lucide="loader-2" class="spin" size="48" style="margin-bottom: 20px;"></i>
                <h4 style="font-weight: 800; color: #0f172a; font-size: 18px; margin-bottom: 8px;">Mengekstrak Data...</h4>
                <p style="font-size: 14px; color: #64748b; line-height: 1.6;">Harap tunggu sebentar, sistem sedang memproses <br><span style="color: #2563eb; font-weight: 600;">${fileName}</span></p>
            </div>
        `;
        lucide.createIcons();

        google.script.run
            .withSuccessHandler((response) => {
                closeDrivePicker(); // Close modal on success
                if (response.success) {
                    if (response.data && response.data.length > 0) {
                        renderTransactions(response.data);
                        document.getElementById('extractionInfo').innerText = `Ditemukan ${response.data.length} transaksi dari Excel: ${fileName}`;
                        showView('manage-view', document.querySelector('.nav-item[onclick*="manage-view"]'));
                        showToast("Berhasil memproses " + response.data.length + " transaksi.");
                    } else {
                        showToast("File berhasil dibaca, namun tidak ditemukan data transaksi yang valid.", "warning");
                    }
                } else {
                    showToast("Gagal memproses file: " + (response.error || "Terjadi kesalahan sistem"), "error");
                    console.error("Drive Processing Error:", response.error);
                }
            })
            .withFailureHandler((err) => {
                showToast("Koneksi gagal atau sesi habis. Silakan coba lagi.", "error");
                console.error("Script Run Failure:", err);
            })
            .processExcelByFileId(fileId);
    }
</script>
