<!-- Rencana Extra Section -->
<div id="rencanaExtraSection" style="display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e2e8f0;">
    <h4 style="font-size: 14px; font-weight: 700; margin-bottom: 12px;">Detail Perencanaan</h4>
    <div class="form-group">
        <label>Kategori</label>
        <input type="text" id="custKategori" placeholder="Kategori barang/jasa" oninput="updatePreview()">
    </div>
    <div class="form-group">
        <label>Jumlah Barang</label>
        <input type="number" id="custJumlahBarang" placeholder="1" oninput="updatePreview()">
    </div>
    <div class="form-group full-width">
        <label>Spesifikasi</label>
        <textarea id="custSpesifikasi" placeholder="Spesifikasi lengkap" style="width: 100%; padding: 12px 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; min-height: 80px;" oninput="updatePreview()"></textarea>
    </div>
    <div class="form-group full-width">
        <label>Persyaratan</label>
        <textarea id="custPersyaratan" placeholder="Persyaratan penyedia" style="width: 100%; padding: 12px 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; min-height: 80px;" oninput="updatePreview()"></textarea>
    </div>
</div>
