<script>
    // --- SURAT PESANAN TEMPLATE ---
    function getPesananHtml(schoolData, schoolKop, uraian, cleanUraian, tanggalPesan, tanggalKegiatan, datePesanInfo, dateKegiatanInfo, perihal, tempatKegiatan, waktuKegiatan, tembusan) {
        const nomorSurat = document.getElementById('custNomorSurat')?.value || "020/SD-BOS/2025";
        const vendorName = document.getElementById('custVendorName')?.value || "Toko/Supplier";
        const jmlPesanan = document.getElementById('custJumlahPesanan')?.value || "1 Paket";
        const jenisKegiatan = document.getElementById('custJenisKegiatanPesanan')?.value;
        
        let rincianTableHtml = '';
        
        if (jenisKegiatan === 'makanan') {
            const rows = document.querySelectorAll('#makananList .makanan-row');
            if (rows.length > 0) {
                let html = '<tbody><tr style="background:#f0f0f0;font-weight:bold;"><td style="border:1px solid #000;padding:8px;width:40px;">No</td><td style="border:1px solid #000;padding:8px;">Menu Makanan/Snack</td><td style="border:1px solid #000;padding:8px;width:80px;">Volume</td><td style="border:1px solid #000;padding:8px;width:80px;">Satuan</td><td style="border:1px solid #000;padding:8px;width:120px;">Harga Satuan</td><td style="border:1px solid #000;padding:8px;width:120px;">Jumlah</td></tr>';
                rows.forEach((row, i) => {
                    const inputs = row.querySelectorAll('input');
                    html += `<tr><td style="border:1px solid #000;padding:8px;text-align:center;">${i+1}</td><td style="border:1px solid #000;padding:8px;">${inputs[0]?.value||'-'}</td><td style="border:1px solid #000;padding:8px;text-align:center;">${inputs[1]?.value||'-'}</td><td style="border:1px solid #000;padding:8px;text-align:center;">${inputs[2]?.value||'-'}</td><td style="border:1px solid #000;padding:8px;text-align:right;">${(parseInt(inputs[3]?.value)||0).toLocaleString('id-ID')}</td><td style="border:1px solid #000;padding:8px;text-align:right;">${(parseInt(inputs[4]?.value)||0).toLocaleString('id-ID')}</td></tr>`;
                });
                html += '</tbody>';
                rincianTableHtml = `<table style="width:100%;border-collapse:collapse;border:1px solid #000;margin:20px auto;">${html}</table>`;
            }
        } else if (jenisKegiatan === 'barang') {
            const rows = document.querySelectorAll('#barangList .barang-row');
            if (rows.length > 0) {
                let html = '<tbody><tr style="background:#f0f0f0;font-weight:bold;"><td style="border:1px solid #000;padding:8px;width:40px;">No</td><td style="border:1px solid #000;padding:8px;">Nama Barang</td><td style="border:1px solid #000;padding:8px;">Spesifikasi</td><td style="border:1px solid #000;padding:8px;width:80px;">Volume</td><td style="border:1px solid #000;padding:8px;width:80px;">Satuan</td><td style="border:1px solid #000;padding:8px;width:120px;">Harga Satuan</td><td style="border:1px solid #000;padding:8px;width:120px;">Jumlah</td></tr>';
                rows.forEach((row, i) => {
                    const inputs = row.querySelectorAll('input');
                    html += `<tr><td style="border:1px solid #000;padding:8px;text-align:center;">${i+1}</td><td style="border:1px solid #000;padding:8px;">${inputs[0]?.value||'-'}</td><td style="border:1px solid #000;padding:8px;">${inputs[1]?.value||'-'}</td><td style="border:1px solid #000;padding:8px;text-align:center;">${inputs[2]?.value||'-'}</td><td style="border:1px solid #000;padding:8px;text-align:center;">${inputs[3]?.value||'-'}</td><td style="border:1px solid #000;padding:8px;text-align:right;">${(parseInt(inputs[4]?.value)||0).toLocaleString('id-ID')}</td><td style="border:1px solid #000;padding:8px;text-align:right;">${(parseInt(inputs[5]?.value)||0).toLocaleString('id-ID')}</td></tr>`;
                });
                html += '</tbody>';
                rincianTableHtml = `<table style="width:100%;border-collapse:collapse;border:1px solid #000;margin:20px auto;">${html}</table>`;
            }
        } else if (jenisKegiatan === 'jasa') {
            const rows = document.querySelectorAll('#jasaList .jasa-row');
            if (rows.length > 0) {
                let html = '<tbody><tr style="background:#f0f0f0;font-weight:bold;"><td style="border:1px solid #000;padding:8px;width:40px;">No</td><td style="border:1px solid #000;padding:8px;">Jenis Pekerjaan</td><td style="border:1px solid #000;padding:8px;width:80px;">Volume</td><td style="border:1px solid #000;padding:8px;width:80px;">Satuan</td><td style="border:1px solid #000;padding:8px;width:120px;">Harga Satuan</td><td style="border:1px solid #000;padding:8px;width:120px;">Jumlah</td></tr>';
                rows.forEach((row, i) => {
                    const inputs = row.querySelectorAll('input');
                    html += `<tr><td style="border:1px solid #000;padding:8px;text-align:center;">${i+1}</td><td style="border:1px solid #000;padding:8px;">${inputs[0]?.value||'-'}</td><td style="border:1px solid #000;padding:8px;text-align:center;">${inputs[1]?.value||'-'}</td><td style="border:1px solid #000;padding:8px;text-align:center;">${inputs[2]?.value||'-'}</td><td style="border:1px solid #000;padding:8px;text-align:right;">${(parseInt(inputs[3]?.value)||0).toLocaleString('id-ID')}</td><td style="border:1px solid #000;padding:8px;text-align:right;">${(parseInt(inputs[4]?.value)||0).toLocaleString('id-ID')}</td></tr>`;
                });
                html += '</tbody>';
                rincianTableHtml = `<table style="width:100%;border-collapse:collapse;border:1px solid #000;margin:20px auto;">${html}</table>`;
            }
        }

        return `
            <div style="font-family: 'Times New Roman', serif; color: #000; padding: 10px 40px; width: 100%; box-sizing: border-box;">
                ${schoolKop}
                <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                    <p>${schoolData.kecamatan}, ${datePesanInfo.fullDate}</p>
                </div>
                <div style="display: grid; grid-template-columns: 100px 20px 1fr; gap: 5px; margin-bottom: 30px;">
                    <div>Nomor</div><div>:</div><div>${nomorSurat}</div>
                    <div>Sifat</div><div>:</div><div>Biasa</div>
                    <div>Lampiran</div><div>:</div><div>-</div>
                    <div>Perihal</div><div>:</div><div style="font-weight: bold; text-decoration: underline;">${perihal}</div>
                    <div style="grid-column: 3; margin-top: 10px;">
                        <strong>Kepada Yth,</strong><br>
                        <strong>${vendorName}</strong><br>
                        di Tempat
                    </div>
                </div>
                <p>Assalamualaikum Wr, Wb.</p>
                <p style="text-indent: 40px; text-align: justify; line-height: 1.5;">
                    Dengan Hormat, sehubungan dengan akan dilaksanakannya kegiatan <b>${cleanUraian}</b> di ${schoolData.name}, maka kami bermaksud memesan ${jmlPesanan} kepada perusahaan yang Bapak/Ibu pimpin.
                </p>
                <p style="text-indent: 40px; text-align: justify; line-height: 1.5;">
                    Adapun kegiatan tersebut akan dilaksanakan pada:
                </p>
                <div style="margin: 20px 40px; line-height: 2;">
                    <div style="display: grid; grid-template-columns: 100px 20px 1fr;">
                        <div>Hari/Tanggal</div><div>:</div><div>${dateKegiatanInfo.fullDate}</div>
                        <div>Waktu</div><div>:</div><div>${waktuKegiatan}</div>
                        <div>Tempat</div><div>:</div><div>${tempatKegiatan}</div>
                    </div>
                </div>
                <p style="text-indent: 40px; margin-bottom: 20px;">Adapun rincian pesanan adalah sebagai berikut:</p>
                ${rincianTableHtml}
                <p style="text-indent: 40px; margin-bottom: 40px;">Demikian surat pesanan ini kami sampaikan. Atas perhatian dan kerjasamanya kami ucapkan terima kasih.</p>
                <div style="display: flex; justify-content: flex-end; margin-top: 30px;">
                    <div style="text-align: center;">
                        <p style="font-weight: bold; margin-bottom: 80px;">Kepala Sekolah,</p>
                        <p style="font-weight: bold; text-decoration: underline; margin: 0;">${schoolData.principal}</p>
                        <p style="margin: 0;">NIP. ${schoolData.principalNip}</p>
                    </div>
                </div>
                <div style="margin-top: 40px; font-size: 11px;">
                    <p style="text-decoration: underline; margin:0;">Tembusan:</p>
                    <div style="white-space: pre-line; margin:0; padding-left: 20px;">${tembusan||"1. Pengawas Pembina\n2. K3S Kecamatan"}</div>
                </div>
            </div>`;
    }
</script>
