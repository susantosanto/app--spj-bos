<!-- SK Pembagian Tugas Section -->
<div id="skPembagianTugasSection" style="display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e2e8f0;">
    <h4 style="font-size: 14px; font-weight: 700; margin-bottom: 12px;">Detail SK Pembagian Tugas</h4>
    <div class="form-group">
        <label>Nama Guru</label>
        <input type="text" id="custSkGuruName" placeholder="Nama guru" oninput="updatePreview()">
    </div>
    <div class="form-group">
        <label>NIP</label>
        <input type="text" id="custSkGuruNip" placeholder="NIP" oninput="updatePreview()">
    </div>
    <div class="form-group">
        <label>Tugas Tambahan</label>
        <input type="text" id="custSkTugas" placeholder="Contoh: Wali Kelas 6" oninput="updatePreview()">
    </div>
    <div class="form-group">
        <label>Tahun Ajaran</label>
        <input type="text" id="custSkTahun" placeholder="2025/2026" oninput="updatePreview()">
    </div>
</div>
