<div id="skPembagianTugasSection"
    style="display: none; border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px;">
    <label style="font-weight: bold; font-size: 14px; margin-bottom: 10px; display: block;">Data Guru (Pihak
        Kedua)</label>
    <div class="form-group">
        <label>Nama Guru</label>
        <input type="text" id="custSkGuruNama" oninput="updatePreview()" placeholder="SITI AISAH NUR FITRI, S.Pd">
    </div>
    <div class="form-group">
        <label>NIP Guru</label>
        <input type="text" id="custSkGuruNip" oninput="updatePreview()" placeholder="-">
    </div>
    <div class="form-group">
        <label>Pangkat, Gol/Ruang</label>
        <input type="text" id="custSkGuruPangkat" oninput="updatePreview()" placeholder="-">
    </div>
    <div class="form-group">
        <label>Jabatan</label>
        <input type="text" id="custSkGuruJabatan" oninput="updatePreview()" placeholder="Guru Kelas">
    </div>
    <div class="form-group">
        <label>Tugas Mengajar</label>
        <input type="text" id="custSkGuruTugas" oninput="updatePreview()" placeholder="Mengajar Kelas IV">
    </div>
    <div class="form-group">
        <label>Jumlah Jam</label>
        <input type="text" id="custSkGuruJam" oninput="updatePreview()" placeholder="24 Jam/Minggu">
    </div>
    <div class="form-group">
        <label>Tahun Pelajaran</label>
        <input type="text" id="custSkTahunAjar" oninput="updatePreview()" placeholder="2025/2026">
    </div>
</div>
