<script>
    // --- BERITA ACARA TEMPLATE ---
    function getBeritaAcaraHtml(schoolData, schoolKop, vendorName, uraian, jumlah, tanggal, dateInfo) {
        const nomorSurat = document.getElementById('custNomorSurat')?.value || "020/SD-BOS/2025";
        const cleanUraian = uraian.replace(/^(Belanja )?Konsumsi \((Makan & Snack|Makan|Snack)\) /i, "").replace(/^Konsumsi \((Makan & Snack|Makan|Snack)\) /i, "");
        
        return `
            <div style="font-family: 'Times New Roman', serif; color: #000; padding: 10px 40px; width: 100%; box-sizing: border-box;">
                ${schoolKop}
                <div style="text-align: center; font-weight: bold; font-size: 16px; margin-bottom: 20px; text-decoration: underline;">BERITA ACARA SERAH TERIMA</div>
                <div style="text-align: center; margin-bottom: 20px;">Nomor: ${nomorSurat}</div>
                
                <p style="text-align: justify; line-height: 1.5;">Pada hari ini ${dateInfo.dayName} tanggal ${dateInfo.fullDate}, bertempat di ${schoolData.name}, telah dilaksanakan serah terima ${cleanUraian} dengan nilai Rp ${jumlah.toLocaleString('id-ID')} (${terbilang(jumlah)} Rupiah) dari:</p>
                
                <table style="width: 100%; margin: 20px 0;">
                    <tr><td style="width: 200px;">Nama</td><td>: ${vendorName || "........................"}</td></tr>
                    <tr><td>Alamat</td><td>: ${document.getElementById('custVendorAddress')?.value || "........................"}</td></tr>
                </table>
                
                <p style="text-align: justify; line-height: 1.5;">Kepada:</p>
                
                <table style="width: 100%; margin: 20px 0;">
                    <tr><td style="width: 200px;">Nama</td><td>: ${schoolData.treasurer}</td></tr>
                    <tr><td>NIP</td><td>: ${schoolData.treasurerNip}</td></tr>
                    <tr><td>Jabatan</td><td>: Bendahara ${schoolData.name}</td></tr>
                </table>
                
                <p style="text-align: justify; line-height: 1.5;">Demikian berita acara ini dibuat dengan sebenarnya untuk dapat dipergunakan sebagaimana mestinya.</p>
                
                <div style="display: flex; justify-content: space-between; margin-top: 40px;">
                    <div style="text-align: center; min-width: 200px;">
                        <p style="margin-bottom: 5px;">${schoolData.kecamatan}, ${dateInfo.fullDate}</p>
                        <p style="font-weight: bold; margin-bottom: 80px;">Yang Menyerahkan,</p>
                        <p style="font-weight: bold; text-decoration: underline; margin: 0;">${vendorName || "........................"}</p>
                    </div>
                    <div style="text-align: center; min-width: 200px;">
                        <p style="margin-bottom: 5px;">${schoolData.kecamatan}, ${dateInfo.fullDate}</p>
                        <p style="font-weight: bold; margin-bottom: 80px;">Yang Menerima,</p>
                        <p style="font-weight: bold; text-decoration: underline; margin: 0;">${schoolData.treasurer}</p>
                        <p style="margin: 0;">NIP. ${schoolData.treasurerNip}</p>
                    </div>
                </div>
            </div>`;
    }
</script>
