<script>
    // UI/UX Interactive Logic
    lucide.createIcons();

    // Load settings from localStorage
    function loadSettings() {
        const savedSchoolData = JSON.parse(localStorage.getItem('spj_school_data') || '{}');
        if (savedSchoolData) {
            const schoolNameEl = document.getElementById('schoolName');
            if (schoolNameEl) schoolNameEl.value = savedSchoolData.schoolName || '';
            const schoolAddressEl = document.getElementById('schoolAddress');
            if (schoolAddressEl) schoolAddressEl.value = savedSchoolData.schoolAddress || '';
            const npsnEl = document.getElementById('npsn');
            if (npsnEl) npsnEl.value = savedSchoolData.npsn || '';
            const kecamatanEl = document.getElementById('kecamatan');
            if (kecamatanEl) kecamatanEl.value = savedSchoolData.kecamatan || '';
            const principalNameEl = document.getElementById('principalName');
            if (principalNameEl) principalNameEl.value = savedSchoolData.principalName || '';
            const principalNipEl = document.getElementById('principalNip');
            if (principalNipEl) principalNipEl.value = savedSchoolData.principalNip || '';
            const treasurerNameEl = document.getElementById('treasurerName');
            if (treasurerNameEl) treasurerNameEl.value = savedSchoolData.treasurerName || '';
            const treasurerNipEl = document.getElementById('treasurerNip');
            if (treasurerNipEl) treasurerNipEl.value = savedSchoolData.treasurerNip || '';
        }
    }

    window.addEventListener('load', () => {
        // Hide initial loader
        const loader = document.getElementById('initialLoader');
        if (loader) {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }, 800);
        }

        // Initialize App
        startRealtimeClock();
        loadSettings(); // Dari localStorage di views/dashboard
    });

    function showView(viewId, element) {
        // Navigation Logic
        const views = document.querySelectorAll('.view-section');
        views.forEach(v => v.classList.remove('active'));

        const targetView = document.getElementById(viewId);
        if (targetView) targetView.classList.add('active');

        // Nav visual state
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(i => i.classList.remove('active'));
        if (element) element.classList.add('active');
    }

    function handleLogout() {
        showConfirm("Apakah Anda yakin ingin keluar?", () => {
            // Animasi transisi keluar
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s';
            setTimeout(() => {
                window.location.reload();
            }, 600);
        }, "Logout System", "Ya, Logout Sekarang");
    }

    // --- Toast Notification System ---
    function showToast(message, type = 'success', duration = 3000) {
        const toastContainer = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.classList.add('toast', type);

        let iconHtml = '';
        if (type === 'success') {
            iconHtml = '<i data-lucide="check-circle" size="20"></i>';
        } else if (type === 'error') {
            iconHtml = '<i data-lucide="x-circle" size="20"></i>';
        } else {
            iconHtml = '<i data-lucide="info" size="20"></i>';
        }

        toast.innerHTML = `
            <div class="toast-icon">${iconHtml}</div>
            <div class="toast-content">
                <div class="toast-title">${message}</div>
            </div>
        `;
        toastContainer.appendChild(toast);
        lucide.createIcons(); // Re-render lucide icons for the new toast

        setTimeout(() => {
            toast.classList.add('toast-out');
            toast.addEventListener('animationend', () => {
                toast.remove();
            });
        }, duration);
    }

    // --- Custom Confirm Modal System ---
    let confirmCallback = null;

    function showConfirm(message, onConfirm, title = "Konfirmasi", btnText = "Hapus Data") {
        const confirmOverlay = document.getElementById('confirmOverlay');
        document.getElementById('confirmTitle').innerText = title;
        document.getElementById('confirmMessage').innerText = message;
        document.getElementById('confirmBtnText').innerText = btnText;
        confirmCallback = onConfirm;
        confirmOverlay.style.display = 'flex';
        lucide.createIcons();
    }

    function closeConfirm(confirmed) {
        const confirmOverlay = document.getElementById('confirmOverlay');
        confirmOverlay.style.display = 'none';
        if (confirmed && confirmCallback) {
            confirmCallback();
        }
        confirmCallback = null; // Reset callback
    }

    // Action: Save School Data
    function saveData() {
        const formData = {
            schoolName: document.getElementById('schoolName').value,
            schoolAddress: document.getElementById('schoolAddress').value,
            npsn: document.getElementById('npsn').value,
            kecamatan: document.getElementById('kecamatan').value,
            principalName: document.getElementById('principalName').value,
            principalNip: document.getElementById('principalNip').value,
            treasurerName: document.getElementById('treasurerName').value,
            treasurerNip: document.getElementById('treasurerNip').value
        };

        const btn = document.querySelector('.btn-submit');
        const originalText = btn.innerHTML;

        // Visual feedback
        btn.innerHTML = '<i data-lucide="loader-2" class="spin" size="18"></i> Menyimpan...';
        lucide.createIcons();
        btn.disabled = true;

        // Save to LocalStorage instead of Google Script Properties
        localStorage.setItem('spj_school_data', JSON.stringify(formData));

        setTimeout(() => {
            showToast("Data Berhasil Disimpan di Browser!");
            btn.innerHTML = originalText;
            btn.disabled = false;
            lucide.createIcons();
        }, 500);
    }

    // renderTransactions moved to js_transactions.html to avoid duplication

    // ═══ EXPOSE FUNCTIONS TO GLOBAL SCOPE ════════════════════════
    window.showToast = showToast;
    window.showConfirm = showConfirm;
    window.showView = showView;
    window.handleLogout = handleLogout;
    window.startRealtimeClock = startRealtimeClock;
    window.loadSettings = loadSettings;

    console.log('✅ js_ui loaded - functions:', {
        showToast: typeof window.showToast,
        showView: typeof window.showView,
        startRealtimeClock: typeof window.startRealtimeClock,
        loadSettings: typeof window.loadSettings
    });
</script>

<style>
    .spin {
        animation: rotate 2s linear infinite;
    }

    @keyframes rotate {
        from {
            transform: rotate(0deg);
        }

        to {
            transform: rotate(360deg);
        }
    }
</style>
