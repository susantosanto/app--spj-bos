<!-- SPK Extra Section -->
<div id="spkExtraSection" style="display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e2e8f0;">
    <h4 style="font-size: 14px; font-weight: 700; margin-bottom: 12px;">Detail SPK</h4>
    <div class="form-group">
        <label>Provider</label>
        <input type="text" id="custSpkProvider" placeholder="Penyedia barang/jasa" oninput="updatePreview()">
    </div>
    <div class="form-group">
        <label>Tgl Negosiasi</label>
        <input type="date" id="custTglNegosiasi" onchange="updatePreview()">
    </div>
    <div class="form-group">
        <label>Waktu Pelaksanaan</label>
        <input type="date" id="custWaktuPelaksanaan" onchange="updatePreview()">
    </div>
    <div class="form-group">
        <label>Waktu Penyelesaian</label>
        <input type="date" id="custWaktuPenyelesaian" onchange="updatePreview()">
    </div>
    <div class="form-group full-width">
        <label>Instruksi</label>
        <textarea id="custInstruksi" placeholder="Instruksi pekerjaan..." style="width: 100%; padding: 12px 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; min-height: 80px;" oninput="updatePreview()"></textarea>
    </div>
</div>
