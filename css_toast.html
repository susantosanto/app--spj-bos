<style>
    /* --- Custom Notification Styles --- */
    .toast-container {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        gap: 12px;
        pointer-events: none;
    }

    .toast {
        background: white;
        padding: 16px 20px;
        border-radius: 12px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 320px;
        pointer-events: auto;
        border-left: 4px solid var(--primary);
        animation: toastIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        position: relative;
        overflow: hidden;
    }

    .toast.error {
        border-left-color: #ef4444;
    }

    .toast.success {
        border-left-color: #10b981;
    }

    .toast-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 50%;
    }

    .toast.success .toast-icon {
        background: #ecfdf5;
        color: #10b981;
    }

    .toast.error .toast-icon {
        background: #fef2f2;
        color: #ef4444;
    }

    .toast-content {
        flex-grow: 1;
    }

    .toast-title {
        font-weight: 600;
        font-size: 14px;
        color: #1e293b;
    }

    @keyframes toastIn {
        from {
            transform: translateX(100%);
            opacity: 0;
        }

        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    .toast-out {
        animation: toastOut 0.3s ease-in forwards !important;
    }

    @keyframes toastOut {
        to {
            transform: translateX(100%);
            opacity: 0;
        }
    }

    /* --- Custom Confirm Modal --- */
    .confirm-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.5);
        backdrop-filter: blur(4px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 11000;
        animation: fadeIn 0.2s ease-out;
    }

    .confirm-modal {
        background: white;
        border-radius: 24px;
        padding: 32px;
        width: 100%;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        transform: scale(0.95);
        animation: modalScaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes modalScaleUp {
        to {
            transform: scale(1);
        }
    }

    .confirm-icon {
        width: 64px;
        height: 64px;
        background: #fef2f2;
        color: #ef4444;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
    }

    .confirm-modal h3 {
        font-size: 20px;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 12px;
    }

    .confirm-modal p {
        font-size: 15px;
        color: var(--text-muted);
        line-height: 1.6;
        margin-bottom: 32px;
    }

    .confirm-actions {
        display: flex;
        gap: 12px;
    }

    .confirm-actions button {
        flex: 1;
        padding: 12px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: var(--transition);
    }

    .confirm-btn-cancel {
        background: #f1f5f9;
        color: #64748b;
        border: 1px solid #e2e8f0;
    }

    .confirm-btn-cancel:hover {
        background: #e2e8f0;
    }

    .confirm-btn-ok {
        background: #ef4444;
        color: white;
        border: none;
    }

    .confirm-btn-ok:hover {
        background: #dc2626;
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .sidebar-footer {
        padding-top: 20px;
        font-size: 11px;
        text-align: center;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        margin-top: auto;
    }

    .btn-logout {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        background: rgba(239, 68, 68, 0.1);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.2);
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        margin-bottom: 15px;
        text-decoration: none;
    }

    .btn-logout:hover {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
        box-shadow: 0 0 15px rgba(239, 68, 68, 0.1);
    }

    /* --- Clock Widget Styles --- */
    .clock-widget {
        background: var(--white);
        padding: 12px 24px;
        border-radius: 16px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);

        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: center;
        transition: var(--transition);
    }

    .clock-widget:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        border-color: var(--primary);
    }

    .clock-time {
        font-size: 42px;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 50%, #2563eb 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1.1;
        letter-spacing: 6px;
        filter: drop-shadow(0 4px 15px rgba(59, 130, 246, 0.4));
    }

    .clock-date {
        font-size: 13px;
        color: #64748b;
        font-weight: 500;

        display: flex;
        align-items: center;
        gap: 6px;
    }
</style>
