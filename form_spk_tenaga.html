<!-- SPK Tenaga Honorer Section -->
<div id="spkTenagaHonorerSection" style="display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e2e8f0;">
    <h4 style="font-size: 14px; font-weight: 700; margin-bottom: 12px;">Detail PKS Tenaga Honorer</h4>
    <div class="form-group">
        <label>Nama Tenaga Honorer</label>
        <input type="text" id="custSpkTenagaName" placeholder="Nama tenaga honorer" oninput="updatePreview()">
    </div>
    <div class="form-group">
        <label>Jabatan</label>
        <input type="text" id="custSpkTenagaJabatan" placeholder="Contoh: Penjaga Sekolah" oninput="updatePreview()">
    </div>
    <div class="form-group">
        <label>Tugas Utama</label>
        <input type="text" id="custSpkTenagaTugas" placeholder="Tugas utama" oninput="updatePreview()">
    </div>
    <div class="form-group full-width">
        <label>Honor per Bulan</label>
        <input type="number" id="custSpkTenagaHonor" placeholder="500000" oninput="updatePreview()">
    </div>
</div>
