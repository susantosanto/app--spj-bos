<!-- View 1: Unggah BKU -->
<section id="upload-view" class="view-section">
    <div class="header-center">
        <h2>Mulai Dokumentasi SPJ</h2>
        <p>Pilih file Buku Kas Umum (BKU) Anda untuk memulai ekstraksi transaksi otomatis.</p>
    </div>

    <div style="max-width: 600px; margin: 0 auto 60px;">
        <div class="upload-container-premium">
            <div class="upload-card-new" onclick="openDrivePicker()"
                style="background: linear-gradient(135deg, #166534 0%, #22c55e 100%); padding: 80px 40px; border-radius: 32px; color: white; cursor: pointer; transition: all 0.4s ease; position: relative; overflow: hidden; box-shadow: 0 30px 60px -12px rgba(34, 197, 94, 0.4); text-align: center;">
                <div
                    style="position: absolute; top: -50px; right: -50px; width: 250px; height: 250px; background: rgba(255,255,255,0.1); border-radius: 50%;">
                </div>
                <div class="upload-icon-premium"
                    style="background: rgba(255,255,255,0.2); color: white; width: 90px; height: 90px; border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 32px; backdrop-filter: blur(5px);">
                    <i data-lucide="hard-drive" size="44"></i>
                </div>
                <h3 style="font-size: 32px; font-weight: 900; margin-bottom: 12px; letter-spacing: -1px;">Google
                    Drive</h3>
                <p
                    style="opacity: 0.9; text-transform: none; letter-spacing: 0; font-size: 16px; font-weight: 400; max-width: 300px; margin: 0 auto;">
                    Pilih file BKU langsung dari folder Drive Anda dengan cepat.</p>
                <div
                    style="margin-top: 40px; display: inline-flex; align-items: center; gap: 12px; font-weight: 800; font-size: 15px; background: rgba(255,255,255,0.2); padding: 12px 24px; border-radius: 50px;">
                    <span>Cari File Sekarang</span>
                    <i data-lucide="arrow-right" size="18"></i>
                </div>
            </div>
        </div>
    </div>
</section>
