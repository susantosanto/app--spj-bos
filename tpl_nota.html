    function getNotaMediaKomputerHtml(schoolData, vendorAddress, tanggal, hwAttr, itemsHtml, jumlah) {

><div style="flex-grow: 1;"><div style="display: flex; justify-content: space-around; font-size: 13px;"><div style="text-align: center;">Yang Terima,<br><br><br>( ................. )</div><div style="text-align: center;">Hormat Kami,<br><br><br>( ................. )</div></div><p style="margin-top: 15px; font-size: 11px; font-weight: bold; font-style: italic;">Barang yang sudah dibeli tidak dapat dikembalikan</p></div><div style="width: 250px; text-align: right; font-weight: bold; font-size: 16px; padding-top: 10px;">JUMLAH Rp. <span style="display: inline-block; width: 120px; border-bottom: 2px solid #000; text-align: right; padding-bottom: 5px; ${hwAttr}">${jumlah.toLocaleString('id-ID')}</span></div></div></div>`;

    }

    function getNotaStandardHtml(schoolData, vendorName, vendorAddress, tanggal, hwAttr, jumlah, uraian, itemsHtml) {
        // Use itemsHtml directly - NO empty rows added (same as FrontEnd.html)
        let tbodyHtml = itemsHtml || '';

        // If no items, use default uraian row (NO empty rows)
        if (!itemsHtml || itemsHtml === '') {
            tbodyHtml = `<tr><td style="border: 1px solid #ddd; padding: 10px; ${hwAttr}">${uraian}</td><td style="border: 1px solid #ddd; padding: 10px; text-align: center; ${hwAttr}">1</td><td style="border: 1px solid #ddd; padding: 10px; text-align: right; ${hwAttr}">${jumlah.toLocaleString('id-ID')}</td><td style="border: 1px solid #ddd; padding: 10px; text-align: right; ${hwAttr}">${jumlah.toLocaleString('id-ID')}</td></tr>`;
        }

        return `<div style="font-family: 'Arial', sans-serif; color: #000; border: 1px solid #ccc; padding: 40px; background: #fff; max-width: 100%;"><div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; border-bottom: 2px solid #000; padding-bottom: 20px;"><div><h1 style="margin: 0; font-size: 28px; font-weight: bold; text-transform: uppercase;">${vendorName}</h1><p style="margin: 5px 0 0 0; font-size: 12px; color: #555;">${vendorAddress}</p></div><div style="text-align: right;"><h2 style="margin: 0; font-size: 24px; color: #555;">NOTA</h2><p style="margin: 5px 0 0 0; font-size: 13px;">Tanggal: <strong style="${hwAttr}">${tanggal}</strong></p><p style="margin: 2px 0 0 0; font-size: 13px;">Kepada: <strong style="${hwAttr}">${schoolData.name}</strong></p></div></div><table style="width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 13px; font-family: inherit;"><thead style="background: #f8f9fa;"><tr><th style="border: 1px solid #ddd; padding: 12px; text-align: left; width: 50%;">URAIAN</th><th style="border: 1px solid #ddd; padding: 12px; text-align: center; width: 10%;">QTY</th><th style="border: 1px solid #ddd; padding: 12px; text-align: right; width: 20%;">HARGA</th><th style="border: 1px solid #ddd; padding: 12px; text-align: right; width: 20%;">TOTAL</th></tr></thead><tbody>${tbodyHtml}</tbody><tfoot><tr style="font-weight: bold; background: #f8f9fa;"><td colspan="3" style="border: 1px solid #ddd; padding: 12px; text-align: right;">TOTAL TAGIHAN</td><td style="border: 1px solid #ddd; padding: 12px; text-align: right; ${hwAttr}">Rp ${jumlah.toLocaleString('id-ID')}</td></tr></tfoot></table><div style="display: flex; justify-content: space-between; margin-top: 40px;"><div style="text-align: center; width: 200px;"><p style="margin-bottom: 60px; font-size: 13px;">Tanda Terima,</p><div style="border-bottom: 1px solid #000; width: 100%;"></div></div><div style="text-align: center; width: 200px; position: relative;"><p style="margin-bottom: 60px; font-size: 13px;">Hormat Kami,</p><p style="font-weight: bold; margin: 0;">${vendorName}</p></div></div></div>`;
    }

    function getNotaPlainHtml(schoolData, vendorAddress, tanggal, dateInfo, hwAttr, jumlah, uraian, terbilangText, itemsHtml) {
        // Use itemsHtml directly - NO empty rows added (same as FrontEnd.html)
        let plainRows = itemsHtml || '';

        // If no items, use default single row (NO empty rows)
        if (!itemsHtml || itemsHtml === '') {
            plainRows = `<tr style="height:32px;"><td style="border-right:1.5px solid #888; border-bottom:1px solid #ddd; padding:2px 8px; text-align:center; width:60px; ${hwAttr}">1</td><td style="border-right:1.5px solid #888; border-bottom:1px solid #ddd; padding:2px 8px; ${hwAttr}">${uraian}</td><td style="border-right:1.5px solid #888; border-bottom:1px solid #ddd; padding:2px 8px; text-align:right; width:110px; ${hwAttr}">${jumlah.toLocaleString('id-ID')}</td><td style="border-bottom:1px solid #ddd; padding:2px 8px; text-align:right; width:120px; ${hwAttr}">${jumlah.toLocaleString('id-ID')}</td></tr>`;
        }

        return `<div style="font-family: 'Arial', sans-serif; color: #1a1a1a; padding: 22px 26px; background: #fffef5; width: 100%; border: 1.5px solid #c8b89a; border-radius: 3px; box-shadow: inset 0 0 40px rgba(180,150,80,0.06);"><div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px;"><div style="font-size:13px; line-height:2;"><div>Kepada Yth. <span style="border-bottom:1px solid #888; display:inline-block; min-width:180px; padding-bottom:1px; ${hwAttr}">${schoolData.name}</span></div><div>di &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Tempat</div></div><div style="text-align:right; font-size:13px; line-height:2;"><div>${schoolData.kecamatan}, <span style="border-bottom:1px solid #888; display:inline-block; min-width:120px; padding-bottom:1px; ${hwAttr}">${dateInfo.fullDate}</span></div><div>No. &nbsp;<span style="border-bottom:1px solid #888; display:inline-block; min-width:80px; padding-bottom:1px; ${hwAttr}">-</span></div></div></div><div style="border-top:1.5px solid #888; margin-bottom:0;"></div><table style="width:100%; border-collapse:collapse; font-size:13px; font-family: inherit;"><thead><tr style="border-bottom:1.5px solid #888;"><th style="border-right:1.5px solid #888; padding:6px 8px; width:60px; font-weight:600; text-align: center;">Banyak</th><th style="border-right:1.5px solid #888; padding:6px 8px; text-align:left; font-weight:600;">Nama Barang</th><th style="border-right:1.5px solid #888; padding:6px 8px; width:110px; font-weight:600; text-align: right;">Harga</th><th style="padding:6px 8px; text-align:right; width:120px; font-weight:600;">Jumlah</th></tr></thead><tbody>${plainRows}</tbody></table><div style="display:flex; justify-content:flex-end; border-top:1.5px solid #888; padding-top:8px; margin-top:0;"><div style="font-size:14px; font-weight:700; display:flex; gap:20px; align-items:center;"><span>Jumlah</span><span style="border-bottom:1.5px solid #333; min-width:140px; text-align:right; display:inline-block; padding-bottom:2px; ${hwAttr}">Rp ${jumlah.toLocaleString('id-ID')}</span></div></div><div style="font-size:11px; color:#555; margin-top:4px; font-style:italic; text-align:right; ${hwAttr}">Terbilang: ${terbilangText}</div><div style="display:flex; justify-content:space-between; margin-top:30px; font-size:13px;"><div style="text-align:center;"><div style="margin-bottom:50px;">Yang Menerima,</div><div style="border-top:1px solid #555; width:130px; padding-top:4px;">( ..................... )</div></div><div style="text-align:center; position:relative;"><div style="margin-bottom:50px;">Hormat Kami,</div><div style="border-top:1px solid #555; width:130px; padding-top:4px;">( ..................... )</div></div></div></div>`;
    }

    function getNotaCustomHtml(vendorStyle, vendorName, vendorAddress, tanggal, schoolData, nomorSurat, jumlah, terbilangText, hwAttr, itemsHtml) {
        const templates = JSON.parse(localStorage.getItem('spj_custom_templates') || '{}');
        const template = templates[vendorStyle];

        let customItemsHtml = itemsHtml || '';
        if (!customItemsHtml || customItemsHtml === '') {
            customItemsHtml = `<tr><td style="border: 1px solid #ddd; padding: 10px; ${hwAttr}">Barang/Jasa</td><td style="border: 1px solid #ddd; padding: 10px; text-align: center; ${hwAttr}">1</td><td style="border: 1px solid #ddd; padding: 10px; text-align: right; ${hwAttr}">${jumlah.toLocaleString('id-ID')}</td><td style="border: 1px solid #ddd; padding: 10px; text-align: right; ${hwAttr}">${jumlah.toLocaleString('id-ID')}</td></tr>`;
        }

        // Ensure table styling blends correctly into custom template
        customItemsHtml = customItemsHtml.replace(/border-right: 2px solid #000/g, 'border: 1px solid #ddd').replace(/border-bottom: 1px solid #000/g, 'border: 1px solid #ddd');

        if (!template) return getNotaStandardHtml(schoolData, vendorName, vendorAddress, tanggal, hwAttr, jumlah, "Barang", customItemsHtml);

        // Replace template variables
        let html = template.html
            .replace(/\$\{tanggal\}/g, tanggal)
            .replace(/\$\{schoolData\.name\}/g, schoolData.name)
            .replace(/\$\{jumlah\.toLocaleString\('id-ID'\)\}/g, jumlah.toLocaleString('id-ID'))
            .replace(/\$\{itemsHtml\}/g, customItemsHtml);
        return html;
    }
</script>
