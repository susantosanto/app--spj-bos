            return `<div style="font-family: 'Arial', sans-serif; color: #1a1a1a; padding: 22px 26px; background: #fffef5; width: 100%; border: 1.5px solid #c8b89a; border-radius: 3px; box-shadow: inset 0 0 40px rgba(180,150,80,0.06);"><div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px;"><div style="font-size:13px; line-height:2;"><div>Kepada Yth. <span style="border-bottom:1px solid #888; display:inline-block; min-width:180px; padding-bottom:1px; ${hwAttr}">${schoolData.name}</span></div><div>di &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Tempat</div></div><div style="text-align:right; font-size:13px; line-height:2;"><div>${schoolData.kecamatan}, <span style="border-bottom:1px solid #888; display:inline-block; min-width:120px; padding-bottom:1px; ${hwAttr}">${data.dateInfo.fullDate}</span></div><div>No. &nbsp;<span style="border-bottom:1px solid #888; display:inline-block; min-width:80px; padding-bottom:1px; ${hwAttr}">-</span></div></div></div><div style="border-top:1.5px solid #888; margin-bottom:0;"></div><table style="width:100%; border-collapse:collapse; font-size:13px; font-family: inherit;"><thead><tr style="border-bottom:1.5px solid #888;"><th style="border-right:1.5px solid #888; padding:6px 8px; width:60px; font-weight:600; text-align: center;">Banyak</th><th style="border-right:1.5px solid #888; padding:6px 8px; text-align:left; font-weight:600;">Nama Barang</th><th style="border-right:1.5px solid #888; padding:6px 8px; width:110px; font-weight:600; text-align: right;">Harga</th><th style="padding:6px 8px; text-align:right; width:120px; font-weight:600;">Jumlah</th></tr></thead><tbody>${itemsHtmlSwapped}</tbody></table><div style="display:flex; justify-content:flex-end; border-top:1.5px solid #888; padding-top:8px; margin-top:0;"><div style="font-size:14px; font-weight:700; display:flex; gap:20px; align-items:center;"><span>Jumlah</span><span style="border-bottom:1.5px solid #333; min-width:140px; text-align:right; display:inline-block; padding-bottom:2px; ${hwAttr}">Rp ${jumlah.toLocaleString('id-ID')}</span></div></div><div style="font-size:11px; color:#555; margin-top:4px; font-style:italic; text-align:right; ${hwAttr}">Terbilang: ${terbilangText}</div><div style="display:flex; justify-content:space-between; margin-top:30px; font-size:13px;"><div style="text-align:center;"><div style="margin-bottom:50px;">Yang Menerima,</div><div style="border-top:1px solid #555; width:130px; padding-top:4px;">( ..................... )</div></div><div style="text-align:center; position:relative;"><div style="margin-bottom:50px;">Hormat Kami,</div>${stampBase64 ? `<img src="${stampBase64}" style="position:absolute; top:0; left:50%; transform:translateX(-50%); width:65px; opacity:0.65;">` : ''}<div style="border-top:1px solid #555; width:130px; padding-top:4px;">( ..................... )</div></div></div></div>`;
        } else if (vendorStyle.startsWith('custom_')) {
            const templates = JSON.parse(localStorage.getItem('spj_custom_templates') || '{}');
            const tpl = templates[vendorStyle];
            if (tpl) {
                try {
                    let rawHtml = tpl.html;
                    const vars = {
                        vendorName, vendorAddress, tanggal, nomorSurat, uraian,
                        jumlah: "Rp " + jumlah.toLocaleString('id-ID'),
                        jumlahRaw: jumlah, terbilang: terbilangText,
                        schoolName: schoolData.name, schoolAddress: schoolData.address,
                        hwAttr: hwAttr, fullDate: data.dateInfo.fullDate
                    };
                    Object.keys(vars).forEach(k => {
                        rawHtml = rawHtml.split('${' + k + '}').join(vars[k]);
                    });
                    return rawHtml;
                } catch (e) { return `<div style="color:red; padding:20px;">Error rendering custom template: ${e.message}</div>`; }
            }
            return `<div style="padding:20px;">Custom template not found</div>`;
        }
        return `<div>Nota style unknown: ${vendorStyle}</div>`;
    }
</script>
