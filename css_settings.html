<style>
    /* ========================================
       ULTIMATE PREMIUM SETTINGS 2026
       ======================================== */
    .settings-elite-container {
        display: grid;
        grid-template-columns: 2fr 1.2fr;
        gap: 32px;
        align-items: start;
        animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .settings-elite-panel {
        background: #ffffff;
        border-radius: 32px;
        padding: 40px;
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(226, 232, 240, 0.8);
        position: relative;
        overflow: hidden;
    }

    .settings-elite-panel::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 6px;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
    }

    .panel-elite-header {
        margin-bottom: 40px;
    }

    .panel-elite-title {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .icon-elite-box {
        width: 60px;
        height: 60px;
        border-radius: 20px;
        background: color-mix(in srgb, var(--box-color) 12%, transparent);
        color: var(--box-color);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 8px 16px -4px color-mix(in srgb, var(--box-color) 30%, transparent);
    }

    .panel-elite-title h3 {
        font-size: 24px;
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 6px;
        letter-spacing: -0.5px;
    }

    .panel-elite-title p {
        font-size: 14px;
        color: #64748b;
        line-height: 1.5;
    }

    /* Form Elite */
    .form-elite {
        display: flex;
        flex-direction: column;
        gap: 24px;
    }

    .form-grid-elite {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
    }

    .form-group-elite.full {
        grid-column: span 2;
    }

    .form-group-elite label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        color: #334155;
        margin-bottom: 10px;
        letter-spacing: 0.5px;
    }

    .input-elite-wrapper {
        position: relative;
        display: flex;
        align-items: center;
        border-radius: 16px;
        background: #f8fafc;
        border: 2px solid transparent;
        transition: all 0.3s ease;
    }

    .input-elite-wrapper i {
        position: absolute;
        left: 16px;
        color: #94a3b8;
        transition: color 0.3s ease;
    }

    .input-elite-wrapper input {
        width: 100%;
        padding: 16px 16px 16px 48px;
        background: transparent;
        border: none;
        font-size: 15px;
        color: #0f172a;
        font-family: 'Outfit', sans-serif;
        font-weight: 500;
        outline: none;
    }

    .input-elite-wrapper input::placeholder {
        color: #cbd5e1;
    }

    .input-elite-wrapper:focus-within {
        background: #ffffff;
        border-color: #3b82f6;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.15);
    }

    .input-elite-wrapper:focus-within i {
        color: #3b82f6;
    }

    .form-elite-divider {
        grid-column: span 2;
        text-align: center;
        margin: 16px 0;
        position: relative;
    }

    .form-elite-divider::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        height: 1px;
        background: #e2e8f0;
        z-index: 1;
    }

    .form-elite-divider span {
        position: relative;
        z-index: 2;
        background: #ffffff;
        padding: 0 16px;
        font-size: 12px;
        font-weight: 800;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* Save Button Elite */
    .form-elite-footer {
        margin-top: 16px;
        display: flex;
        justify-content: flex-end;
    }

    .btn-elite-save {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 16px 32px;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: #ffffff;
        border: none;
        border-radius: 16px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
    }

    .btn-elite-save:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 30px -10px rgba(59, 130, 246, 0.5);
    }

    .btn-elite-save:active {
        transform: translateY(0);
    }

    /* Backup Actions Elite */
    .backup-elite-card {
        display: flex;
        flex-direction: column;
        height: 100%;
    }

    .backup-elite-actions {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .backup-action-elite {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 24px;
        background: #f8fafc;
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.4s ease;
        border: 2px solid transparent;
    }

    .backup-action-elite.download:hover {
        background: #ffffff;
        border-color: #3b82f6;
        box-shadow: 0 10px 25px rgba(59, 130, 246, 0.15);
    }

    .backup-action-elite.restore:hover {
        background: #ffffff;
        border-color: #10b981;
        box-shadow: 0 10px 25px rgba(16, 185, 129, 0.15);
    }

    .backup-action-elite .action-icon {
        width: 50px;
        height: 50px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        color: #64748b;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        transition: all 0.4s ease;
    }

    .backup-action-elite.download:hover .action-icon {
        color: #3b82f6;
    }

    .backup-action-elite.restore:hover .action-icon {
        color: #10b981;
    }

    .backup-action-elite .action-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .backup-action-elite .title {
        font-size: 16px;
        font-weight: 700;
        color: #0f172a;
    }

    .backup-action-elite .desc {
        font-size: 13px;
        color: #64748b;
    }

    /* Backup Stats Elite */
    .backup-elite-stats {
        margin-top: auto;
        padding-top: 32px;
        display: flex;
        gap: 24px;
    }

    .stat-bubble {
        flex: 1;
        background: #f1f5f9;
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        transition: all 0.3s ease;
    }

    .stat-bubble:hover {
        background: #e2e8f0;
        transform: translateY(-4px);
    }

    .stat-bubble .value {
        font-size: 28px;
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 4px;
    }

    .stat-bubble .label {
        font-size: 12px;
        font-weight: 600;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    @media (max-width: 1200px) {
        .settings-elite-container {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 768px) {
        .form-grid-elite {
            grid-template-columns: 1fr;
        }

        .form-group-elite {
            grid-column: span 2;
        }

        .settings-elite-panel {
            padding: 24px;
        }
    }
</style>
