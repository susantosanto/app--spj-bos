<!-- View 3: Data Sekolah - Premium Elite Design 2026 -->
<section id="settings-view" class="view-section">
    <div class="settings-elite-container">
        <!-- Left Panel - School Data -->
        <div class="settings-elite-panel main">
            <div class="panel-elite-header">
                <div class="panel-elite-title">
                    <div class="icon-elite-box" style="--box-color: #3b82f6;">
                        <i data-lucide="school" size="24"></i>
                    </div>
                    <div>
                        <h3>Profil Instansi Pribadi</h3>
                        <p>Konfigurasi data master untuk otomatisasi dokumen SPJ & Kop Surat.</p>
                    </div>
                </div>
            </div>

            <form id="schoolForm" class="form-elite">
                <div class="form-grid-elite">
                    <div class="form-group-elite full">
                        <label>Nama Sekolah / Instansi</label>
                        <div class="input-elite-wrapper">
                            <i data-lucide="building"></i>
                            <input type="text" id="schoolName" name="schoolName"
                                placeholder="Contoh: SD NEGERI 01 CONTOH">
                        </div>
                    </div>

                    <div class="form-group-elite full">
                        <label>Alamat Lengkap</label>
                        <div class="input-elite-wrapper">
                            <i data-lucide="map-pin"></i>
                            <input type="text" id="schoolAddress" name="schoolAddress"
                                placeholder="Jl. Pendidikan No. 123">
                        </div>
                    </div>

                    <div class="form-group-elite">
                        <label>NPSN / Kode Registrasi</label>
                        <div class="input-elite-wrapper">
                            <i data-lucide="hash"></i>
                            <input type="text" id="npsn" name="npsn" placeholder="12345678">
                        </div>
                    </div>

                    <div class="form-group-elite">
                        <label>Kecamatan</label>
                        <div class="input-elite-wrapper">
                            <i data-lucide="map"></i>
                            <input type="text" id="kecamatan" name="kecamatan" placeholder="Contoh: Cikalongwetan">
                        </div>
                    </div>

                    <div class="form-elite-divider"><span>Pejabat Penandatangan</span></div>

                    <div class="form-group-elite">
                        <label>Nama Kepala Sekolah</label>
                        <div class="input-elite-wrapper">
                            <i data-lucide="user"></i>
                            <input type="text" id="principalName" name="principalName"
                                placeholder="Nama Lengkap & Gelar">
                        </div>
                    </div>

                    <div class="form-group-elite">
                        <label>NIP Kepala Sekolah</label>
                        <div class="input-elite-wrapper">
                            <i data-lucide="credit-card"></i>
                            <input type="text" id="principalNip" name="principalNip"
                                placeholder="19XXXXXXXX XXXXXX X XXX">
                        </div>
                    </div>

                    <div class="form-group-elite">
                        <label>Nama Bendahara</label>
                        <div class="input-elite-wrapper">
                            <i data-lucide="user-check"></i>
                            <input type="text" id="treasurerName" name="treasurerName"
                                placeholder="Nama Lengkap & Gelar">
                        </div>
                    </div>

                    <div class="form-group-elite">
                        <label>NIP Bendahara</label>
                        <div class="input-elite-wrapper">
                            <i data-lucide="credit-card"></i>
                            <input type="text" id="treasurerNip" name="treasurerNip"
                                placeholder="19XXXXXXXX XXXXXX X XXX">
                        </div>
                    </div>
                </div>

                <div class="form-elite-footer">
                    <button type="button" class="btn-elite-save" onclick="saveData()">
                        <span>Simpan Konfigurasi</span>
                        <i data-lucide="save" size="20"></i>
                    </button>
                </div>
            </form>
        </div>

        <!-- Right Panel - Backup & Restore -->
        <div class="settings-elite-panel side">
            <!-- Backup Card -->
            <div class="backup-elite-card">
                <div class="panel-elite-header">
                    <div class="panel-elite-title">
                        <div class="icon-elite-box" style="--box-color: #10b981;">
                            <i data-lucide="database" size="24"></i>
                        </div>
                        <div>
                            <h3>Pusat Keamanan Data</h3>
                            <p>Manajemen enkripsi & backup</p>
                        </div>
                    </div>
                </div>

                <div class="backup-elite-actions">
                    <div class="backup-action-elite download" onclick="backupData()">
                        <div class="action-icon"><i data-lucide="download-cloud" size="24"></i></div>
                        <div class="action-text">
                            <span class="title">Ekspor Backup Data</span>
                            <span class="desc">JSON Terenkripsi Format Baru</span>
                        </div>
                    </div>

                    <div class="backup-action-elite restore" onclick="document.getElementById('restoreFile').click()">
                        <div class="action-icon"><i data-lucide="upload-cloud" size="24"></i></div>
                        <div class="action-text">
                            <span class="title">Pulihkan Data (Restore)</span>
                            <span class="desc">Timpa dari Sistem Cadangan Lokal</span>
                        </div>
                    </div>
                </div>

                <input type="file" id="restoreFile" accept=".json" style="display: none;" onchange="restoreData(this)">

                <div class="backup-elite-stats">
                    <div class="stat-bubble">
                        <div class="value" id="statTransactions">0</div>
                        <div class="label">Transaksi</div>
                    </div>
                    <div class="stat-bubble">
                        <div class="value" id="statTemplates">0</div>
                        <div class="label">Template</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    // Update stats when viewing settings
    function updateBackupStats() {
        const transactionCount = typeof allTransactions !== 'undefined' ? allTransactions.length : 0;
        const templates = JSON.parse(localStorage.getItem('spj_custom_templates') || '{}');
        const templateCount = Object.keys(templates).length;

        const elTx = document.getElementById('statTransactions');
        const elTpl = document.getElementById('statTemplates');

        if (elTx) elTx.textContent = transactionCount;
        if (elTpl) elTpl.textContent = templateCount;
    }

    // Call updateBackupStats when settings view is shown
    const originalShowViewSettings = window.showView;
    window.showView = function (viewId, element) {
        if (originalShowViewSettings) originalShowViewSettings.call(this, viewId, element);
        if (viewId === 'settings-view') {
            setTimeout(updateBackupStats, 100);
        }
    };
</script>
