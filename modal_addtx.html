<!-- Add Manual Transaction Modal -->
<div id="addModal" class="modal-overlay">
    <div class="modal-container" style="width: 100%; max-width: 500px; padding: 32px;">
        <div
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid #f1f5f9; padding-bottom: 16px;">
            <h3 style="font-size: 20px; font-weight: 800; color: #0f172a;">Tambah Transaksi Manual</h3>
            <button onclick="closeAddModal()"
                style="background: #f8fafc; border: none; cursor: pointer; color: #64748b; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s;">
                <i data-lucide="x" size="20"></i>
            </button>
        </div>

        <div class="form-grid-modal">
            <div class="form-group">
                <label>Tanggal</label>
                <input type="date" id="addDate"
                    style="width: 100%; border-radius: 10px; border: 1px solid #e2e8f0; padding: 10px;">
            </div>
            <div class="form-group">
                <label>No Bukti</label>
                <input type="text" id="addNoBukti" placeholder="Contoh: BKU-001"
                    style="width: 100%; border-radius: 10px; border: 1px solid #e2e8f0; padding: 10px;">
            </div>
            <div class="form-group form-full-width">
                <label>Uraian Belanja</label>
                <input type="text" id="addUraian" placeholder="Contoh: Belanja ATK Kegiatan..."
                    style="width: 100%; border-radius: 10px; border: 1px solid #e2e8f0; padding: 10px;">
            </div>
            <div class="form-group form-full-width">
                <label>Penerima / Toko</label>
                <input type="text" id="addPenerima" placeholder="Contoh: Toko Abadi"
                    style="width: 100%; border-radius: 10px; border: 1px solid #e2e8f0; padding: 10px;">
            </div>
            <div class="form-group form-full-width">
                <label>Jumlah (Rp)</label>
                <input type="number" id="addJumlah" placeholder="0"
                    style="width: 100%; border-radius: 10px; border: 1px solid #e2e8f0; padding: 10px;">
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn-primary" style="background: #64748b; flex: 1;" onclick="closeAddModal()">
                Batal
            </button>
            <button class="btn-primary" style="flex: 1;" onclick="saveManualTransaction()">
                <i data-lucide="save" size="18"></i>
                Simpan
            </button>
        </div>
    </div>
</div>
