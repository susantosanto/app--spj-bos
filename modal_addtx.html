<!-- Add Transaction Modal -->
<div id="addModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Tambah Transaksi Manual</h3>
                <button class="btn-close" onclick="closeAddModal()">
                    <i data-lucide="x" size="20"></i>
                </button>
            </div>
            <form id="addTransactionForm" onsubmit="saveManualTransaction(event)">
                <div class="form-group">
                    <label>Tanggal</label>
                    <input type="date" id="addTanggal" required>
                </div>
                <div class="form-group">
                    <label>No. Bukti</label>
                    <input type="text" id="addNoBukti" placeholder="Contoh: 001/SPJ/2025" required>
                </div>
                <div class="form-group">
                    <label>Uraian</label>
                    <input type="text" id="addUraian" placeholder="Deskripsi transaksi" required>
                </div>
                <div class="form-group">
                    <label>Jumlah (Rp)</label>
                    <input type="number" id="addJumlah" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label>Penerima</label>
                    <input type="text" id="addPenerima" placeholder="Nama penerima" required>
                </div>
                <div class="form-group">
                    <label>Jenis Transaksi</label>
                    <select id="addJenis" style="width: 100%; padding: 12px 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;">
                        <option value="kwitansi">Kwitansi</option>
                        <option value="nota">Nota</option>
                        <option value="jasa">Jasa</option>
                    </select>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 20px;">
                    <button type="button" class="btn-danger" onclick="closeAddModal()" style="flex: 1; justify-content: center;">
                        Batal
                    </button>
                    <button type="submit" class="btn-primary" style="flex: 1; justify-content: center;">
                        Simpan
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
